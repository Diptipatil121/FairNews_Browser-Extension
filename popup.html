<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FairNews Bias Analyzer</title>

  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-strong: #1e40af;
      --border: rgba(15, 23, 42, 0.08);
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
      color: var(--text);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .logo {
  width: 90px;
  height: 90px;
  object-fit: contain;
  margin-right: 10px;
}


    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      text-align: center;
      margin: 6px 0 14px;
      font-size: 12px;
      color: var(--muted);
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: var(--primary);
      color: white;
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: background 120ms ease, transform 120ms ease;
    }

    button:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }

    .card {
      margin-top: 12px;
      padding: 14px 14px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.05);
      font-size: 13px;
      line-height: 1.4;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .status {
      color: var(--muted);
      font-weight: 600;
    }

    .status-detail {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.12);
      border-top-color: var(--primary);
      border-radius: 999px;
      animation: spin 700ms linear infinite;
      display: inline-block;
      margin-left: 8px;
      vertical-align: text-bottom;
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .spinner.active {
      opacity: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .score {
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
      color: var(--text);
    }

    .result-header {
      display: none; /* hide top score and label over gauge */
      text-align: center;
      margin-bottom: 16px;
    }

    .huge-score {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary-strong);
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1;
    }

    .score-description {
      margin: 4px 0 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
    }

    .gauge-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px auto 20px;
      width: 100%;
      max-width: 380px;
      padding: 12px;
      background: linear-gradient(135deg, rgba(37,99,235,0.12), rgba(239,68,68,0.12));
      border-radius: 18px;
      border: 1px solid rgba(37,99,235,0.25);
    }

    .bias-gauge {
      width: 100%;
      max-width: 380px;
      height: auto;
      overflow: visible;
    }

    .bias-gauge {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      transform: scale(1);
      transition: transform 300ms ease;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .metric-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .metric-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .result-meta {
      flex: 1;
      min-width: 120px;
    }

    .bias-gauge {
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      transform: scale(1);
      transition: transform 300ms ease;
    }

    .bias-gauge:hover {
      transform: scale(1.03);
    }

    .gauge-track {
      fill: none;
      stroke: #e2e8f0;
      stroke-width: 18;
      stroke-linecap: round;
      opacity: 0.85;
    }

    .gauge-arc {
      fill: none;
      stroke-width: 18;
      stroke-linecap: round;
      stroke-dasharray: 188;
      stroke-dashoffset: 188;
      animation: arcDraw 1.1s ease forwards;
      filter: drop-shadow(0 4px 8px rgba(15, 23, 42, 0.2));
    }

    .gauge-arc--neg {
      stroke: url(#gradNeg);
    }

    .gauge-arc--pos {
      stroke: url(#gradPos);
    }

    .gauge-label {
      font-size: 12px;
      fill: #1f2937;
      font-weight: 700;
    }

    .gauge-needle {
      stroke-width: 5;
      stroke-linecap: round;
      stroke: #064e3b;
      stroke-opacity: 0.95;
      filter: drop-shadow(0px 0px 13px rgba(16, 185, 129, 0.55));
      transition: transform 700ms cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke 240ms ease;
      transform-origin: 70px 70px;
    }

    .needle-hub {
      fill: #0f172a;
      stroke: #f8fafc;
      stroke-width: 2;
      filter: drop-shadow(0px 0px 8px rgba(15, 23, 42, 0.5));
    }

    .gauge-needle {
      stroke-width: 5;
      stroke-linecap: round;
      stroke: #1e3a8a;
      stroke-opacity: 0.95;
      filter: drop-shadow(0px 2px 5px rgba(0, 0, 0, 0.3));
      transition: transform 700ms cubic-bezier(0.175, 0.885, 0.32, 1.275), stroke 240ms ease;
      transform-origin: 70px 70px;
    }

    .gauge-needle.small-bump {
      animation: needleBounce 0.8s;
    }

    @keyframes arcDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes needleBounce {
      0% { transform: rotate(var(--last-angle)); }
      40% { transform: rotate(calc(var(--target-angle) + 15deg)); }
      60% { transform: rotate(calc(var(--target-angle) - 8deg)); }
      100% { transform: rotate(var(--target-angle)); }
    }

    .label {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 13px;
      background: rgba(37, 99, 235, 0.12);
      color: var(--primary);
    }

    .label.unknown {
      background: rgba(156, 163, 175, 0.12);
      color: var(--muted);
    }

    .error {
      color: var(--danger);
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
    }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }

    .footer a {
      color: var(--primary-strong);
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <img src="icon16.png" alt="FairNews logo" class="logo" />
    <h1>FairNews Bias Checker</h1>
  </header>

  <div class="subtitle">Instantly visualize political bias and reliability for any article using it's URL.</div>

  <button id="analyzeBtn">Analyze This Article</button>

  <div id="statusCard" class="card" style="display:none;">
    <div class="card-title">Status</div>
    <div>
      <span id="status" class="status">Waiting...</span>
      <span id="spinner" class="spinner" aria-hidden="true"></span>
    </div>
    <div id="statusDetail" class="status-detail">Ready to analyze</div>
  </div>

  <div id="resultCard" class="card" style="display:none;">
    <div class="card-title">Results</div>

    <div class="result-header">
      <p id="biasPercent" class="huge-score">—</p>
      <p id="biasText" class="score-description">Bias category</p>
    </div>

    <div class="gauge-container" aria-hidden="true">
      <svg class="bias-gauge" viewBox="0 0 140 90" aria-hidden="true">
        <defs>
          <linearGradient id="gradNeg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#8b5cf6" />
          </linearGradient>
          <linearGradient id="gradPos" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#14b8a6" />
          </linearGradient>
        </defs>
        <g id="gaugeTicks"></g>
        <path class="gauge-track" d="M 10 70 A 60 60 0 0 1 130 70" />
        <path class="gauge-arc gauge-arc--neg" d="M 10 70 A 60 60 0 0 1 70 10" />
        <path class="gauge-arc gauge-arc--pos" d="M 70 10 A 60 60 0 0 1 130 70" />
        <line id="gaugeNeedle" class="gauge-needle" x1="70" y1="70" x2="70" y2="20" />
        <circle class="needle-hub" cx="70" cy="70" r="6" />      </svg>
    </div>

    <div class="metric-grid">
      <div class="metric-box">
        <div class="metric-title">Bias Score</div>
        <p id="biasScore" class="metric-value">-</p>
      </div>
      <div class="metric-box">
        <div class="metric-title">Bias Label</div>
        <p id="biasLabel" class="metric-value label unknown">-</p>
      </div>
    </div>
  </div>

  <div id="error" class="error" role="alert"></div>

  <div class="footer">Tip: Refresh the page to re-run analysis.<br />Powered by FairNews.</div>

  <script src="popup.js"></script>

</body>
</html>
